<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Code & Barcode Generator | ZHR Tools</title>

<link rel="icon" href="/favicon.png">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:#f8f9fb;
margin:0;
}

/* HEADER */

.logo-header{
position:sticky;
top:0;
z-index:1000;
background:white;
text-align:center;
padding:15px 5px 10px;
border-bottom:1px solid #eee;
}

.logo-header img{
max-width:400px;
height:50px;
}

.page-title{
text-align:center;
font-size:28px;
color:#001d4c;
margin:25px 0;
font-weight:700;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.card h2{
color:#001d4c;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:5px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#001d4c;
color:white;
border:none;
padding:12px;
margin-top:12px;
border-radius:6px;
cursor:pointer;
width:100%;
}

.output{
text-align:center;
margin-top:20px;
}

@media(max-width:768px){
.grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="logo-header">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg-FrquxVNT6X8mePEZk64LLCgRVikX9PnuPOSqK4CKoL9-r2wGHbx1zt7_q-6dlITZ4wfQSnuXLkJDvq8DxSnruDo6wE-kEBY86sLYgJTe8WMxIQN3y4ah6Ffc2As2_z4rGs3cxyBAr3ik-S-GYA6MIm4F4p74-43WT3s573TJoXgdDRPBT1UEP1Q1EFY/s1920/1736676952-picsayjdndnndnd.jpg">
</div>

<h1 class="page-title">QR Code & Barcode Generator</h1>

<div class="container">

<div class="grid">

<!-- QR GENERATOR -->

<div class="card">

<h2>QR Code Generator</h2>

<label>QR Type</label>

<select id="qrType">

<option value="text">Text</option>
<option value="url">URL</option>
<option value="phone">Phone</option>
<option value="email">Email</option>
<option value="sms">SMS</option>

<option value="wifi">WiFi</option>
<option value="vcard">vCard Contact</option>
<option value="location">Google Maps Location</option>
<option value="calendar">Calendar Event</option>

<option value="whatsapp">WhatsApp Message</option>
<option value="instagram">Instagram Profile</option>
<option value="linkedin">LinkedIn Profile</option>
<option value="facebook">Facebook Page</option>
<option value="youtube">YouTube Channel</option>

<option value="upi">UPI Payment</option>
<option value="paypal">PayPal Payment</option>
<option value="stripe">Stripe Payment Link</option>

<option value="app">App Download</option>
<option value="coupon">Coupon Code</option>
<option value="survey">Survey Link</option>
<option value="ticket">Event Ticket</option>

</select>

<textarea id="qrInput" placeholder="Enter required information"></textarea>

<button onclick="generateQR()">Generate QR Code</button>

<div class="output">

<div id="qrcode"></div>

<button onclick="downloadQR()">Download QR</button>

</div>

</div>


<!-- BARCODE -->

<div class="card">

<h2>Barcode Generator</h2>

<input type="text" id="barcodeInput" placeholder="Enter barcode value">

<select id="barcodeType">

<option value="CODE128">CODE128</option>
<option value="EAN13">EAN13</option>
<option value="UPC">UPC</option>
<option value="EAN8">EAN8</option>

</select>

<button onclick="generateBarcode()">Generate Barcode</button>

<div class="output">

<svg id="barcode"></svg>

<button onclick="downloadBarcode()">Download Barcode</button>

</div>

</div>

</div>

</div>

<script>

function generateQR(){

document.getElementById("qrcode").innerHTML="";

let type=document.getElementById("qrType").value;

let input=document.getElementById("qrInput").value;

let data=input;

if(type==="phone") data="tel:"+input;

if(type==="email") data="mailto:"+input;

if(type==="sms") data="sms:"+input;

if(type==="whatsapp") data="https://wa.me/"+input;

if(type==="instagram") data="https://instagram.com/"+input;

if(type==="linkedin") data="https://linkedin.com/in/"+input;

if(type==="facebook") data="https://facebook.com/"+input;

if(type==="youtube") data="https://youtube.com/"+input;

if(type==="location") data="https://maps.google.com/?q="+input;

if(type==="wifi") data="WIFI:S:"+input+";T:WPA;P:password;;";

if(type==="upi") data="upi://pay?pa="+input;

if(type==="paypal") data="https://paypal.me/"+input;

if(type==="stripe") data=input;

new QRCode(document.getElementById("qrcode"),{
text:data,
width:200,
height:200
});

}

function generateBarcode(){

let value=document.getElementById("barcodeInput").value;

let type=document.getElementById("barcodeType").value;

JsBarcode("#barcode",value,{
format:type,
width:2,
height:80,
displayValue:true
});

}

function downloadQR(){

let img=document.querySelector("#qrcode img");

let link=document.createElement("a");

link.href=img.src;

link.download="qr-code.png";

link.click();

}

function downloadBarcode(){

let svg=document.getElementById("barcode");

let xml=new XMLSerializer().serializeToString(svg);

let blob=new Blob([xml],{type:"image/svg+xml"});

let url=URL.createObjectURL(blob);

let link=document.createElement("a");

link.href=url;

link.download="barcode.svg";

link.click();

}

</script>

</body>
</html>
