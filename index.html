<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZHR Dice Game</title>
<link rel="stylesheet" href="layout.css">
<script src="https://unpkg.com/lucide@latest"></script><style>
body{
  background: linear-gradient(135deg,#001d4c,#003a8c);
  color:white;
  font-family:'Segoe UI',sans-serif;
  text-align:center;
}

.container{
  margin-top:60px;
}

.title{
  font-size:36px;
  font-weight:700;
  margin-bottom:20px;
}

.dice-container{
  display:flex;
  justify-content:center;
  gap:40px;
  margin:40px 0;
}

.dice{
  width:120px;
  height:120px;
  background:white;
  border-radius:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  padding:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
  transform-style:preserve-3d;
  transition: transform 0.6s;
}

.dot{
  width:20px;
  height:20px;
  border-radius:50%;
  margin:auto;
}

.red{background:#ff4d4d;}
.blue{background:#4da6ff;}
.green{background:#4dff88;}
.yellow{background:#ffd24d;}
.purple{background:#c77dff;}
.black{background:#222;}

button{
  background:#ffd24d;
  border:none;
  padding:12px 30px;
  font-size:18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  color:#001d4c;
}

button:hover{
  transform:scale(1.05);
}

.result{
  margin-top:20px;
  font-size:22px;
  font-weight:600;
}

</style></head><body>
<div id="header"></div>
<div id="sidebar-container"></div><div class="container"><div class="title">🎲 ZHR Dice Game</div><div class="dice-container">
  <div id="dice1" class="dice"></div>
  <div id="dice2" class="dice"></div>
</div><button onclick="rollDice()">Roll Dice</button>

<div class="result" id="result"></div></div><script>

function createDice(dice, num){
  dice.innerHTML = "";

  const positions = {
    1:[4],
    2:[0,8],
    3:[0,4,8],
    4:[0,2,6,8],
    5:[0,2,4,6,8],
    6:[0,2,3,5,6,8]
  };

  const colors = ["red","blue","green","yellow","purple","black"];

  for(let i=0;i<9;i++){
    const dot = document.createElement("div");

    if(positions[num].includes(i)){
      dot.classList.add("dot", colors[num-1]);
    }

    dice.appendChild(dot);
  }
}

function rollDice(){

  const d1 = Math.floor(Math.random()*6)+1;
  const d2 = Math.floor(Math.random()*6)+1;

  const dice1 = document.getElementById("dice1");
  const dice2 = document.getElementById("dice2");

  dice1.style.transform = "rotateY(360deg) rotateX(360deg)";
  dice2.style.transform = "rotateY(360deg) rotateX(360deg)";

  setTimeout(()=>{
    createDice(dice1,d1);
    createDice(dice2,d2);

    let resultText = "";

    if(d1 > d2) resultText = "Player 1 Wins 🎉";
    else if(d2 > d1) resultText = "Player 2 Wins 🎉";
    else resultText = "It's a Draw 🤝";

    document.getElementById("result").innerText = resultText;

  },300);
}

// initial
createDice(document.getElementById("dice1"),1);
createDice(document.getElementById("dice2"),2);

</script><script src="layout.js"></script></body>
</html>
