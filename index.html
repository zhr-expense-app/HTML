<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML Editor | ZHR Tools</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:#f8f9fb;
}

/* HEADER */

.logo-header{
position:sticky;
top:0;
z-index:1000;
background:white;
text-align:center;
padding:15px 5px 10px;
border-bottom:1px solid #eee;
}

.logo-header img{
max-width:400px;
height:50px;
}

/* TITLE */

.page-title{
text-align:center;
font-size:26px;
font-weight:700;
color:#001d4c;
margin:20px 0;
}

/* BUTTONS */

.controls{
text-align:center;
margin-bottom:10px;
}

button{
background:#001d4c;
color:white;
border:none;
padding:10px 16px;
margin:5px;
border-radius:5px;
font-size:14px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

/* EDITOR GRID */

.editor-container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
padding:10px;
height:70vh;
}

.editor-box{
display:flex;
flex-direction:column;
}

.editor-title{
background:#001d4c;
color:white;
padding:6px;
font-size:14px;
text-align:center;
}

.CodeMirror{
flex:1;
height:100%;
font-size:14px;
}

/* MOBILE */

@media(max-width:768px){

.editor-container{
grid-template-columns:1fr;
height:auto;
}

.CodeMirror{
height:250px;
}

}

</style>

</head>

<body>

<div class="logo-header">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg-FrquxVNT6X8mePEZk64LLCgRVikX9PnuPOSqK4CKoL9-r2wGHbx1zt7_q-6dlITZ4wfQSnuXLkJDvq8DxSnruDo6wE-kEBY86sLYgJTe8WMxIQN3y4ah6Ffc2As2_z4rGs3cxyBAr3ik-S-GYA6MIm4F4p74-43WT3s573TJoXgdDRPBT1UEP1Q1EFY/s1920/1736676952-picsayjdndnndnd.jpg">
</div>

<h1 class="page-title">HTML / CSS / JavaScript Editor</h1>

<div class="controls">

<button onclick="runCode()">Run Code</button>
<button onclick="clearCode()">Clear</button>
<button onclick="copyCode()">Copy Code</button>
<button onclick="downloadHTML()">Download HTML</button>

</div>

<div class="editor-container">

<div class="editor-box">
<div class="editor-title">HTML</div>
<textarea id="htmlCode">

<h1>Hello ZHR Tools</h1>
<p>This is your HTML editor.</p>

</textarea>
</div>

<div class="editor-box">
<div class="editor-title">CSS</div>
<textarea id="cssCode">

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

h1{
color:#001d4c;
}

</textarea>
</div>

<div class="editor-box">
<div class="editor-title">JavaScript</div>
<textarea id="jsCode">

console.log("Welcome to ZHR HTML Editor");

</textarea>
</div>

</div>

<script>

/* Initialize editors */

var htmlEditor=CodeMirror.fromTextArea(document.getElementById("htmlCode"),{
mode:"htmlmixed",
theme:"dracula",
lineNumbers:true
});

var cssEditor=CodeMirror.fromTextArea(document.getElementById("cssCode"),{
mode:"css",
theme:"dracula",
lineNumbers:true
});

var jsEditor=CodeMirror.fromTextArea(document.getElementById("jsCode"),{
mode:"javascript",
theme:"dracula",
lineNumbers:true
});

/* Run code in new tab */

function runCode(){

let html=htmlEditor.getValue();
let css=cssEditor.getValue();
let js=jsEditor.getValue();

let preview=window.open();

preview.document.write(

`<html>
<head>
<style>${css}</style>
</head>

<body>

${html}

<script>
${js}
<\/script>

</body>
</html>`

);

preview.document.close();

}

/* Clear editors */

function clearCode(){

htmlEditor.setValue("");
cssEditor.setValue("");
jsEditor.setValue("");

}

/* Copy code */

function copyCode(){

let code=
htmlEditor.getValue()+
"\n<style>\n"+cssEditor.getValue()+
"\n</style>\n<script>\n"+jsEditor.getValue()+
"\n</script>";

navigator.clipboard.writeText(code);

alert("Code copied!");

}

/* Download HTML */

function downloadHTML(){

let html=htmlEditor.getValue();
let css=cssEditor.getValue();
let js=jsEditor.getValue();

let file=

`<html>
<head>
<style>${css}</style>
</head>

<body>

${html}

<script>
${js}
<\/script>

</body>
</html>`;

let blob=new Blob([file],{type:"text/html"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="zhr-editor.html";

link.click();

}

</script>

</body>
</html>
