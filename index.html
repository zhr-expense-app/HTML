<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZHR 3D Dice</title>
<link rel="stylesheet" href="layout.css">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
  background:#ffffff;
  font-family:'Segoe UI',sans-serif;
  margin:0;
  text-align:center;
}

.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
  flex-direction:column;
}

.title{
  font-size:28px;
  color:#001d4c;
  font-weight:700;
  margin-bottom:30px;
}

.scene{
  width:150px;
  height:150px;
  perspective:600px;
}

.cube{
  width:150px;
  height:150px;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 1s ease;
}

.face{
  position:absolute;
  width:150px;
  height:150px;
  background:white;
  border-radius:16px;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.dot{
  width:18px;
  height:18px;
  border-radius:50%;
  margin:4px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  width:80%;
  height:80%;
}

/* Face positions */
.front{ transform: rotateY(0deg) translateZ(75px); }
.back{ transform: rotateY(180deg) translateZ(75px); }
.right{ transform: rotateY(90deg) translateZ(75px); }
.left{ transform: rotateY(-90deg) translateZ(75px); }
.top{ transform: rotateX(90deg) translateZ(75px); }
.bottom{ transform: rotateX(-90deg) translateZ(75px); }

/* Colors */
.c1{background:#ff4d4d;}
.c2{background:#4da6ff;}
.c3{background:#4dff88;}
.c4{background:#ffd24d;}
.c5{background:#c77dff;}
.c6{background:#000;}

.info{
  margin-top:20px;
  color:#001d4c;
  font-weight:600;
}

</style>
</head>

<body>

<div id="header"></div>
<div id="sidebar-container"></div>

<div class="container">

<div class="title">🎲 Tap Dice to Roll</div>

<div class="scene" onclick="rollDice()">
  <div class="cube" id="cube">

    <div class="face front" id="f1"></div>
    <div class="face back" id="f6"></div>
    <div class="face right" id="f3"></div>
    <div class="face left" id="f4"></div>
    <div class="face top" id="f5"></div>
    <div class="face bottom" id="f2"></div>

  </div>
</div>

<div class="info" id="result">Tap to roll 🎯</div>

</div>

<script>

const positions = {
  1:[4],
  2:[0,8],
  3:[0,4,8],
  4:[0,2,6,8],
  5:[0,2,4,6,8],
  6:[0,2,3,5,6,8]
};

function createFace(id, num, color){
  const face = document.getElementById(id);
  face.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "grid";

  for(let i=0;i<9;i++){
    const dot = document.createElement("div");

    if(positions[num].includes(i)){
      dot.className = "dot "+color;
    }

    grid.appendChild(dot);
  }

  face.appendChild(grid);
}

function setupDice(){
  createFace("f1",1,"c1");
  createFace("f2",2,"c2");
  createFace("f3",3,"c3");
  createFace("f4",4,"c4");
  createFace("f5",5,"c5");
  createFace("f6",6,"c6");
}

function rollDice(){

  const cube = document.getElementById("cube");

  const randomX = Math.floor(Math.random()*4)*90;
  const randomY = Math.floor(Math.random()*4)*90;

  cube.style.transform = `rotateX(${randomX}deg) rotateY(${randomY}deg)`;

  const sound = new Audio("https://www.soundjay.com/misc/sounds/dice-roll-1.mp3");
  sound.play();

  const value = Math.floor(Math.random()*6)+1;
  document.getElementById("result").innerText = "You rolled: " + value;
}

setupDice();

</script>

<script src="layout.js"></script>

</body>
</html>
